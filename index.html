<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=0" />
  <title>RüssSuuger Ämme Storage</title>
  <!-- Tailwind CSS -->
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    body { 
      margin: 0; 
      background-color: #0a0a0a; 
      color: #e5e7eb; 
      font-family: ui-sans-serif, system-ui, -apple-system, sans-serif;
    }
    * { -webkit-tap-highlight-color: transparent; }
    .no-scrollbar::-webkit-scrollbar { display: none; }
    .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
    
    .loader {
      border: 3px solid #222;
      border-top: 3px solid #f97316;
      border-radius: 50%;
      width: 40px;
      height: 40px;
      animation: spin 1s linear infinite;
    }
    @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    
    .loading-text {
      margin-top: 24px;
      font-weight: 900;
      text-transform: uppercase;
      letter-spacing: -0.05em;
      font-size: 1.8rem;
      font-style: italic;
      display: flex;
      align-items: baseline;
      gap: 2px;
    }

    .subtitle {
      font-style: normal;
      font-size: 0.9rem;
      letter-spacing: 0.2em;
      margin-left: 8px;
      font-weight: 700;
    }
  </style>
</head>
<body>
  <div id="root">
    <div style="display: flex; height: 100vh; flex-direction: column; align-items: center; justify-content: center; background-color: #0a0a0a;">
      <div class="loader"></div>
      <div class="loading-text">
        <span style="color: #6b7280;">Rüss</span><span style="color: #f97316;">Suuger</span>
        <span class="subtitle" style="color: #6b7280;">Ämme <span style="color: #4b5563;">Storage</span></span>
      </div>
      <p style="margin-top: 16px; color: #444; font-size: 10px; text-transform: uppercase; letter-spacing: 0.3em; font-weight: bold;">
        Lager-System wird initialisiert
      </p>
    </div>
  </div>
  
  <script type="module" src="/src/App.jsx"></script>
</body>
</html>
